# Trains a LeNet on MNIST with 10% label noise using RhoLoss and a CLIP
# pretrained teacher model.

run_name_format:
  - example
  - $dataset.name
  - $method
  - $dataset.noise_proportion

seed: 1

dataset:
  name: MNIST_Noise
  noise_proportion: 0.1
  root: ./_MNIST
  num_classes: 10
  im_size: [32, 32]
  in_channels: 1
  input_dim: [1, 1, 32, 32]

networks:
  type: LeNet
  params:
    m_type: 'lenet'

training_opt:
  num_epochs: 100
  num_data_workers: 1
  batch_size: 320
  test_batch_size: 512
  optimizer: SGD
  optim_params:
    lr: 0.01
    weight_decay: 0.0
  scheduler_params: {}
  scheduler: 'constant'
  loss_type: CrossEntropy
  loss_params: {}

method: RhoLoss
method_opt:
  ratio: 0.1
  balance: False
  ratio_scheduler: constant
  warmup_epochs: 0

teacher_model_source: clip  # Supported: "local_pretrained", "clip", "timm"
clip:
  clip_architecture: 'ViT-B/16'
  tau: 4

diagnostics:
  logging_defaults:
    log_interval: logarithmic
    save_init: 5
    save_freq: 4
  diagnostics:
    - TrainLoss
    - TrainAcc
    - ValLoss
    - ValAcc
    - Progress
    - Timing
    - Checkpoint
    - SelectedPoints # Only logged to file, not to W&B

wandb:
  project: Example
  mode: online